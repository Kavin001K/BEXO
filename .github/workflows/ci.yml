name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        # Scoped to shipping packages (mockup-sandbox has unrelated React 19 ref typing noise).
        run: pnpm -r --filter "./artifacts/bexo" --filter "./artifacts/api-server" run typecheck
