name: BEXO OTA Update

on:
  push:
    branches:
      - main # Trigger on push to main branch

jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v4

      - name: 🏗 Setup monorepo
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: artifacts/bexo

      - name: 🚀 Publish Update
        run: eas update --auto
        working-directory: artifacts/bexo
